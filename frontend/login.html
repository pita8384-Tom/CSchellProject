<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Caroline Schell</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/main.css?v=3.4" />
    <style>
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: Montserrat, sans-serif;
      }
      .login-container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 3rem;
        border-radius: 1rem;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        border: 1px solid rgba(255, 255, 255, 0.18);
        width: 100%;
        max-width: 400px;
      }
      .login-title {
        color: white;
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 2rem;
        text-align: center;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-label {
        color: white;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
        display: block;
      }
      .form-input {
        width: 100%;
        padding: 0.75rem;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 0.5rem;
        color: white;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
      }
      .form-input:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.3);
        border-color: rgba(255, 255, 255, 0.5);
      }
      .form-input::placeholder {
        color: rgba(255, 255, 255, 0.6);
      }
      .submit-btn {
        width: 100%;
        padding: 0.875rem;
        background: rgba(255, 255, 255, 0.3);
        border: none;
        border-radius: 0.5rem;
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 1rem;
      }
      .submit-btn:hover {
        background: rgba(255, 255, 255, 0.4);
        transform: translateY(-2px);
      }
      .back-link {
        display: block;
        text-align: center;
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        margin-top: 1.5rem;
        font-size: 0.875rem;
        transition: color 0.3s ease;
      }
      .back-link:hover {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1 class="login-title">Admin Login</h1>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" name="username" class="form-input" placeholder="Enter username" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required />
        </div>
        <button type="submit" class="submit-btn">Log In</button>
      </form>
      <a href="index.html" class="back-link">← Back to website</a>
    </div>

    <script src="admin-config.js"></script>
    <script>
      // Redirect if already logged in
      if (isAdminLoggedIn()) {
        window.location.href = "Upload.html";
      }

      document.getElementById("login-form").addEventListener("submit", function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        if (adminLogin(username, password)) {
          window.location.href = "Upload.html";
        } else {
          alert("Invalid username or password");
          document.getElementById("password").value = "";
        }
      });
    </script>
  </body>
</html>
